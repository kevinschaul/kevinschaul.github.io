{{- define "main" -}}

<h2 class="text-sm uppercase mt-0 mb-4">Tags</h2>

{{ with .Data.Terms.Alphabetical }}
<div class="flex flex-wrap gap-2">
  {{ range . }}
  <a
    class="rounded-lg bg-black/[3%] px-4 py-1 no-underline hover:bg-black/[6%] dark:bg-white/[8%] dark:hover:bg-white/[12%]"
    href="{{ .Page.Permalink }}"
    >{{ .Page.Title }}
    <span class="opacity-60">{{ .Count }}</span></a
  >
  {{ end }}
</div>
{{ else }}
<p>No tags yet.</p>
{{ end }}

{{- end -}}
