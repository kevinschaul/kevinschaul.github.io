name: Deploy Hugo site to Pages (+ Sphinx preview)

on:
  push:
    branches:
      - main

  # Runs when issues are opened or edited (for the link-update script)
  issues:
    types: [opened, edited]

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.3
      MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
      X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Update links and posts
        run: uv run scripts/update_links.py

      - name: Commit and push updated content if changed
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || exit 0
          git push

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # ── Hugo build (main site) ──────────────────────────────────────────────
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          hugo --baseURL "${{ steps.pages.outputs.base_url }}/"

      # ── Sphinx build (preview in /sphinx-preview/) ─────────────────────────
      - name: Build Sphinx site (preview)
        run: |
          cd sphinx-site
          make static-prep
          uv run sphinx-build \
            -b dirhtml \
            -D html_baseurl="${{ steps.pages.outputs.base_url }}/sphinx-preview/" \
            . _build/dirhtml
          # Place it inside Hugo's output so both get deployed together
          mkdir -p ../public/sphinx-preview
          cp -r _build/dirhtml/. ../public/sphinx-preview/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
