name: Deploy Sphinx site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Runs when issues are opened or edited (for the link-update script)
  issues:
    types: [opened, edited]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

# Allow only one concurrent deployment; don't cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
      X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Update links and posts
        run: uv run scripts/update_links.py

      - name: Commit and push updated content if changed
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || exit 0
          git push

      - name: Prepare static assets
        run: make static-prep

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Sphinx (dirhtml — clean URLs)
        run: |
          uv run sphinx-build \
            -b dirhtml \
            -D html_baseurl="${{ steps.pages.outputs.base_url }}/" \
            . _build/dirhtml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_build/dirhtml

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
